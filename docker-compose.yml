version: '3.8'

services:
  # NestJS Backend
  backend:
    build:
      context: ./nest_backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - QDRANT_URL=${QDRANT_URL}
      - QDRANT_API_KEY=${QDRANT_API_KEY}
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}
      - PYTHON_SERVICE_URL=http://python-vectorizer:5001
    depends_on:
      - python-vectorizer
    restart: unless-stopped

  # Python Vectorizer Service
  python-vectorizer:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5001:5001"
    environment:
      - PORT=5001
    restart: unless-stopped

  # Frontend (Nginx)
  frontend:
    image: nginx:alpine
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
