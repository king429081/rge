services:
  # NestJS Backend
  - name: rge-backend
    type: web
    region: oregon
    runtime: node
    buildCommand: cd nest_backend && npm install && npm run build
    startCommand: cd nest_backend && npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: MINIMAX_API_KEY
        sync: false
      - key: PYTHON_SERVICE_URL
        value: https://python-vectorizer.onrender.com
    healthCheckPath: /api/documents
