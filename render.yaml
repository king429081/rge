services:
  # NestJS Backend
  - name: rge-backend
    type: web
    region: oregon
    buildCommand: cd nest_backend && npm install && npm run build
    startCommand: cd nest_backend && npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: MINIMAX_API_KEY
        sync: false
      - key: PYTHON_SERVICE_URL
        value: http://python-vectorizer:5001
    healthCheckPath: /api/documents

  # Python Vectorizer Service (using Docker)
  - name: python-vectorizer
    type: web
    region: oregon
    dockerfilePath: python_vectorizer/Dockerfile
    envVars:
      - key: PORT
        value: "5001"
